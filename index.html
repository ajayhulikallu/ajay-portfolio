<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="description" content="Ajay Chakravarthy H J — Assistant Manager (Performance Marketing). Google Ads, PMax, Meta Ads, GA4/GTM, GBP." />
	<title>Ajay Chakravarthy · Performance Marketing</title>

	<style>
		:root{
			/* Premium light theme */
			--bg: #f7f7fb;
			--bg2:#ffffff;
			--card:#ffffff;
			--text:#111322;
			--muted:#4a5166;
			--faint:#6c748c;
			--line: rgba(17,19,34,.10);

			--accent:#5b5cff;     /* premium indigo */
			--accent2:#00b3ff;    /* clean cyan */
			--good:#12b981;       /* emerald */
			--warn:#f59e0b;

			--shadow: 0 18px 60px rgba(17,19,34,.10);
			--shadow2: 0 12px 30px rgba(17,19,34,.08);

			--r: 16px;
			--r2: 24px;

			--mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
			--sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
		}

		*{ box-sizing:border-box; }
		html,body{ height:100%; }
		body{
			margin:0;
			font-family: var(--sans);
			color: var(--text);
			background:
				radial-gradient(1000px 520px at 15% 0%, rgba(91,92,255,.12), transparent 55%),
				radial-gradient(900px 520px at 85% 10%, rgba(0,179,255,.10), transparent 55%),
				linear-gradient(180deg, var(--bg), #ffffff 60%);
			overflow-x:hidden;
		}
		a{ color: inherit; text-decoration:none; }
		.container{ width:min(1140px, 92vw); margin:0 auto; }

		/* Top progress bar */
		#progress{
			position: fixed;
			inset: 0 0 auto 0;
			height: 3px;
			background: linear-gradient(90deg, var(--accent), var(--accent2));
			transform-origin: 0 50%;
			transform: scaleX(0);
			z-index: 9999;
		}

		/* Header */
		header{
			position: sticky;
			top: 0;
			z-index: 50;
			backdrop-filter: blur(10px);
			background: rgba(247,247,251,.75);
			border-bottom: 1px solid var(--line);
		}
		.nav{
			display:flex;
			align-items:center;
			justify-content:space-between;
			gap: 14px;
			padding: 12px 0;
		}
		.brand{
			display:flex;
			align-items:center;
			gap: 12px;
			min-width: 240px;
		}
		.logo{
			width: 38px; height: 38px;
			border-radius: 14px;
			background: linear-gradient(135deg, rgba(91,92,255,1), rgba(0,179,255,.85));
			box-shadow: 0 14px 30px rgba(91,92,255,.18);
		}
		.brand b{ display:block; font-weight: 750; letter-spacing:-.2px; }
		.brand small{ display:block; color: var(--muted); font-size: 12px; margin-top:2px; }

		.kbd{
			font-family: var(--mono);
			font-size: 12px;
			border: 1px solid rgba(17,19,34,.18);
			background: rgba(255,255,255,.65);
			padding: 2px 7px;
			border-radius: 10px;
			color: rgba(17,19,34,.9);
		}

		.hud{
			display:flex; gap: 10px; align-items:center; flex-wrap:wrap;
			justify-content:center;
		}
		.hudCard{
			border: 1px solid var(--line);
			background: rgba(255,255,255,.70);
			box-shadow: var(--shadow2);
			border-radius: 16px;
			padding: 8px 10px;
			display:flex; gap: 10px; align-items:center;
		}
		.hudCard span{ color: var(--muted); font-size: 12px; }
		.hudCard b{ font-size: 12px; }

		.xpbar{
			width: 140px; height: 8px;
			background: rgba(17,19,34,.08);
			border-radius: 99px;
			overflow:hidden;
		}
		.xpbar i{
			display:block; height:100%;
			width: 0%;
			background: linear-gradient(90deg, var(--good), var(--accent2));
			transition: width .4s ease;
		}

		.actions{
			display:flex; gap: 10px; flex-wrap:wrap;
			justify-content:flex-end;
			min-width: 240px;
		}
		.btn{
			border: 1px solid var(--line);
			background: rgba(255,255,255,.80);
			color: var(--text);
			padding: 10px 12px;
			border-radius: 14px;
			font-size: 13px;
			cursor:pointer;
			display:inline-flex; align-items:center; gap: 10px;
			transition: .18s ease;
		}
		.btn:hover{ transform: translateY(-1px); box-shadow: var(--shadow2); }
		.btn.primary{
			background: linear-gradient(135deg, rgba(91,92,255,1), rgba(0,179,255,.75));
			color: white;
			border-color: rgba(255,255,255,.20);
		}
		.btn.ghost{ background: rgba(255,255,255,.55); }

		@media (max-width: 940px){
			.brand, .actions{ min-width: unset; }
			.hud{ display:none; } /* clean mobile header */
		}

		/* Sections */
		main{ padding: 22px 0 60px; }
		.section{ padding: 26px 0; }
		.titleRow{
			display:flex; align-items:flex-end; justify-content:space-between; gap: 12px;
			margin-bottom: 14px;
		}
		.titleRow h2{ margin:0; font-size: 18px; letter-spacing:.2px; }
		.titleRow p{ margin:0; color: var(--muted); font-size: 13px; }

		.hero{
			display:grid;
			grid-template-columns: 1.2fr .8fr;
			gap: 14px;
			align-items:stretch;
		}
		@media (max-width: 940px){
			.hero{ grid-template-columns: 1fr; }
		}
		.card{
			background: var(--card);
			border: 1px solid var(--line);
			border-radius: var(--r2);
			box-shadow: var(--shadow);
			padding: 18px;
		}
		.pills{ display:flex; flex-wrap:wrap; gap: 8px; margin-bottom: 10px; }
		.pill{
			border: 1px solid var(--line);
			background: rgba(247,247,251,.9);
			padding: 6px 10px;
			border-radius: 999px;
			font-size: 12px;
			color: var(--muted);
		}
		.pill.dot:before{
			content:"";
			display:inline-block;
			width:8px; height:8px;
			border-radius: 99px;
			background: var(--good);
			margin-right:8px;
		}
		h1{
			margin: 10px 0 10px;
			font-size: clamp(30px, 3.4vw, 44px);
			line-height: 1.08;
			letter-spacing: -0.6px;
		}
		.lede{
			margin:0;
			color: var(--muted);
			line-height: 1.65;
			font-size: 15px;
			max-width: 68ch;
		}
		.kpis{
			display:grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 10px;
			margin-top: 14px;
		}
		@media (max-width: 940px){
			.kpis{ grid-template-columns: repeat(2, 1fr); }
		}
		.kpi{
			border: 1px solid var(--line);
			background: rgba(247,247,251,.75);
			border-radius: 18px;
			padding: 12px;
		}
		.kpi b{ display:block; font-size: 18px; }
		.kpi span{ display:block; margin-top: 4px; color: var(--muted); font-size: 12px; }

		/* Story carousel */
		.carousel{
			position: relative;
			overflow:hidden;
			border-radius: var(--r2);
			border: 1px solid var(--line);
			background: var(--card);
			box-shadow: var(--shadow);
		}
		.track{
			display:flex;
			transition: transform .45s cubic-bezier(.2,.9,.2,1);
			will-change: transform;
		}
		.slide{
			min-width: 100%;
			padding: 18px;
		}
		.slideGrid{
			display:grid;
			grid-template-columns: 1fr 1fr;
			gap: 12px;
		}
		@media (max-width: 940px){
			.slideGrid{ grid-template-columns: 1fr; }
		}
		.box{
			border: 1px solid var(--line);
			background: rgba(247,247,251,.70);
			border-radius: 18px;
			padding: 14px;
		}
		.box h3{ margin:0 0 8px; font-size: 14px; }
		.box p, .box li{ color: var(--muted); line-height:1.6; }
		.box ul{ margin: 10px 0 0 18px; }

		.carouselNav{
			display:flex; justify-content:space-between; align-items:center;
			padding: 12px 14px;
			border-top: 1px solid var(--line);
			background: rgba(247,247,251,.85);
		}
		.dots{ display:flex; gap: 8px; align-items:center; justify-content:center; flex:1; }
		.dot{
			width: 9px; height: 9px;
			border-radius: 99px;
			background: rgba(17,19,34,.18);
			cursor:pointer;
			transition: .18s ease;
		}
		.dot.active{
			width: 26px;
			background: linear-gradient(90deg, var(--accent), var(--accent2));
		}

		/* Case grid (not cramped) */
		.caseGrid{
			display:grid;
			grid-template-columns: repeat(12, 1fr);
			gap: 12px;
		}
		.case{
			grid-column: span 12;
			background: var(--card);
			border: 1px solid var(--line);
			border-radius: var(--r2);
			box-shadow: var(--shadow2);
			padding: 16px;
			cursor:pointer;
			transition: .18s ease;
		}
		@media (min-width: 940px){
			.case{ grid-column: span 6; }
		}
		.case:hover{ transform: translateY(-2px); }
		.case h3{ margin: 6px 0 10px; font-size: 16px; }
		.meta{ color: var(--muted); font-size: 12px; display:flex; flex-wrap:wrap; gap: 8px; }
		.tags{ display:flex; flex-wrap:wrap; gap: 8px; margin-top: 10px; }
		.tag{
			border: 1px solid var(--line);
			background: rgba(247,247,251,.85);
			padding: 6px 10px;
			border-radius: 999px;
			font-size: 12px;
		}
		.hint{ margin-top: 10px; color: var(--faint); font-size: 12px; }

		/* Dashboard */
		.dashTop{
			display:flex; flex-wrap:wrap; gap: 10px; align-items:center; justify-content:space-between;
			margin-bottom: 12px;
		}
		.tabs{ display:flex; flex-wrap:wrap; gap: 8px; }
		.tab{
			border: 1px solid var(--line);
			background: rgba(255,255,255,.85);
			padding: 8px 10px;
			border-radius: 999px;
			font-size: 12px;
			cursor:pointer;
			color: var(--muted);
		}
		.tab.active{
			color: white;
			background: linear-gradient(90deg, var(--accent), var(--accent2));
			border-color: transparent;
		}
		.chart{
			border: 1px solid var(--line);
			background: rgba(255,255,255,.85);
			border-radius: 18px;
			padding: 10px;
		}
		canvas{ width: 100%; height: 220px; display:block; }

		/* Modal */
		.modal{
			position: fixed; inset:0;
			background: rgba(0,0,0,.40);
			backdrop-filter: blur(10px);
			display:none;
			align-items:center; justify-content:center;
			padding: 16px;
			z-index: 1000;
		}
		.modal.open{ display:flex; }
		.modalCard{
			width: min(980px, 96vw);
			max-height: min(86vh, 900px);
			overflow:auto;
			background: white;
			border-radius: 22px;
			border: 1px solid rgba(17,19,34,.12);
			box-shadow: 0 40px 90px rgba(0,0,0,.25);
		}
		.modalInner{ padding: 16px; }
		.modalTop{
			display:flex; justify-content:space-between; gap: 12px;
			border-bottom: 1px solid var(--line);
			padding-bottom: 12px;
			margin-bottom: 12px;
		}
		.modalTop h3{ margin:0; font-size: 18px; }
		.modalTop p{ margin:6px 0 0; color: var(--muted); font-size: 13px; line-height:1.45; }
		.cols{
			display:grid;
			grid-template-columns: 1fr;
			gap: 12px;
		}
		@media (min-width: 940px){
			.cols{ grid-template-columns: 1fr 1fr; }
		}

		footer{
			padding-top: 14px;
			color: var(--faint);
			font-size: 12px;
		}
	</style>
</head>
<body>
	<div id="progress"></div>

	<header>
		<div class="container nav">
			<div class="brand">
				<div class="logo" aria-hidden="true"></div>
				<div>
					<b>Ajay Chakravarthy H J</b>
					<small>Assistant Manager · Performance Marketing</small>
				</div>
			</div>

			<div class="hud" aria-label="XP and badges">
				<div class="hudCard"><b id="lvl">LVL 1</b><span>Performance Architect</span></div>
				<div class="hudCard"><span>XP</span><div class="xpbar" aria-hidden="true"><i id="xpFill"></i></div><b id="xpTxt">0/100</b></div>
				<div class="hudCard"><span>Badges</span><b id="badgeCount">0</b></div>
			</div>

			<div class="actions">
				<button class="btn ghost" id="openMenu">Quick <span class="kbd">/</span></button>
				<a class="btn" href="#cases">Case files</a>
				<a class="btn primary" href="#contact">Contact</a>
			</div>
		</div>
	</header>

	<main class="container">
